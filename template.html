<!DOCTYPE html>
<html lang="en">
<head>
<!-- ============================================================= -->
<!--  DASHBOARD SECTION TEMPLATE                                    -->
<!--                                                                -->
<!--  Copy this file to start a new page, OR copy one of the        -->
<!--  "card" blocks below into an existing page to add a section.   -->
<!--  Everything here uses the same colors, fonts, glass cards and  -->
<!--  cloud-sync as the rest of the dashboard, so anything you      -->
<!--  build will automatically match the design.                    -->
<!--                                                                -->
<!--  QUICK START                                                   -->
<!--   1. Rename the <title> below.                                 -->
<!--   2. Find the block marked "COPY FROM HERE" and duplicate it   -->
<!--      to make as many sections as you want.                     -->
<!--   3. Give each section its own SECTION_ID (see the script at   -->
<!--      the bottom) so it saves + syncs independently.            -->
<!-- ============================================================= -->
<script src="lock.js"></script>                                  <!-- passcode lock screen -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>New Section · Dashboard</title>

<!-- Shared dashboard scripts. Keep these in this order. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>     <!-- cloud sync across devices -->
<script src="topbar.js" defer></script>   <!-- top water bar + bottom tab nav -->

<style>
/* ============================================================= */
/*  DESIGN SYSTEM — these are the dashboard's shared tokens.      */
/*  Don't change these if you want your section to match the      */
/*  other pages. Use the variables (var(--text-primary), etc.)    */
/*  instead of hard-coding colors.                                */
/* ============================================================= */
:root {
  --text-primary: #FAFAFA;   /* headings, key numbers   */
  --text-secondary: #B8B6B0; /* body text               */
  --text-tertiary: #76746E;  /* labels, captions, hints */
  --success: #6BE3A4;        /* green  — done / good    */
  --warning: #F2C063;        /* amber  — caution        */
  --danger:  #FF6B6B;        /* red    — bad / delete   */
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
/* Soft drifting color glow behind everything. */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
/* Faint dot texture. */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

/* Big gradient page title. */
.dash-title {
  margin: 0 0 14px;
  font-size: 28px; font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* Small uppercase section heading with a divider line. */
.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.section-title::before {
  content: ''; width: 18px; height: 1px;
  background: var(--text-tertiary); opacity: 0.6;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

/* THE GLASS CARD — the main building block. Wrap any section in this. */
.gm-card {
  position: relative;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  overflow: hidden;
}

/* Card header: an eyebrow label + a big number. */
.gm-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 14px;
}
.gm-header-left { display: flex; flex-direction: column; }
.gm-eyebrow {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.gm-progress-row { display: flex; align-items: baseline; gap: 6px; }
.gm-progress-num {
  font-size: 42px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.045em; color: var(--text-primary); line-height: 1;
}
.gm-progress-total { font-family: var(--font-mono); font-size: 18px; color: var(--text-tertiary); }
.gm-progress-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--text-tertiary); margin-left: 4px;
}

/* A little rounded "pill" — handy for streaks, tags, statuses. */
.gm-streak {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-tertiary);
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.10em; text-transform: uppercase;
}

/* Stat grid — a row of metrics. Auto-wraps on small screens. */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 14px;
}
.stat-num {
  font-size: 26px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em; color: var(--text-primary); line-height: 1;
}
.stat-label {
  margin-top: 6px;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-tertiary);
}

/* List rows with a checkbox + editable text + delete button. */
.goal-list { list-style: none; margin: 0; padding: 0; }
.empty-state {
  text-align: center; font-size: 12px; font-style: italic;
  color: var(--text-tertiary); padding: 14px 0;
}
.gm-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; margin-bottom: 6px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  transition: background 0.2s, opacity 0.3s;
}
.gm-row:hover { background: rgba(255,255,255,0.06); }
.gm-row.gm-row-done { opacity: 0.45; background: rgba(107,227,164,0.04); }
.gm-row.gm-row-done .gm-text {
  text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.4);
}
.gm-check {
  appearance: none; -webkit-appearance: none;
  width: 22px; height: 22px; flex-shrink: 0; margin: 0;
  border: 1.5px solid rgba(255,255,255,0.18);
  background: rgba(0,0,0,0.28); border-radius: 7px;
  position: relative; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.gm-check:checked {
  background: var(--success); border-color: var(--success);
  box-shadow: 0 0 12px rgba(107,227,164,0.40);
}
.gm-check:checked::after {
  content: ''; position: absolute; left: 6px; top: 2px;
  width: 6px; height: 11px;
  border: solid #0A0A0B; border-width: 0 2.5px 2.5px 0;
  transform: rotate(45deg);
}
.gm-text {
  flex: 1; font-size: 14px; color: var(--text-primary);
  outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px;
}
.gm-text[contenteditable="true"] {
  outline: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.28);
}
.goal-delete {
  border: 0; background: transparent; color: var(--text-tertiary);
  font-size: 18px; cursor: pointer; padding: 0 4px;
  opacity: 0.5; transition: opacity 0.2s, color 0.2s;
}
.gm-row:hover .goal-delete { opacity: 1; }
.goal-delete:hover { color: var(--danger); }

/* Add-item input row + buttons. */
.gm-input-wrap {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.gm-input {
  flex: 1; min-width: 0;
  padding: 11px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; background: rgba(0,0,0,0.28);
  color: var(--text-primary);
  font-family: inherit; font-size: 14px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.gm-input::placeholder { color: var(--text-tertiary); }
.gm-input:focus { border-color: rgba(255,255,255,0.28); background: rgba(0,0,0,0.36); }

/* Primary (light) button. */
.gm-add {
  padding: 11px 20px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.9),
    0 2px 8px rgba(0,0,0,0.35),
    0 8px 22px rgba(0,0,0,0.25);
  transition: transform 0.1s, filter 0.15s;
}
.gm-add:hover { filter: brightness(1.06); transform: translateY(-1px); }
.gm-add:active { transform: translateY(0); }

/* Secondary (ghost) button. */
.gm-ghost {
  padding: 11px 18px;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px; background: rgba(255,255,255,0.04);
  color: var(--text-primary);
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.gm-ghost:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .gm-progress-num { font-size: 36px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Page title. Rename this. -->
  <h1 class="dash-title">New Section</h1>


  <!-- =========================================================== -->
  <!--  EXAMPLE 1 — STAT CARD                                       -->
  <!--  A header number plus a row of metrics. Pure HTML, no JS.    -->
  <!--  COPY FROM HERE ↓                                            -->
  <!-- =========================================================== -->
  <div class="section">
    <div class="section-title">Overview</div>
    <div class="gm-card">
      <div class="gm-header">
        <div class="gm-header-left">
          <div class="gm-eyebrow">This Week</div>
          <div class="gm-progress-row">
            <span class="gm-progress-num">87</span>
            <span class="gm-progress-total">/ 100</span>
            <span class="gm-progress-label">score</span>
          </div>
        </div>
        <span class="gm-streak">🔥 5 day streak</span>
      </div>

      <div class="stat-grid">
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">Workouts</div></div>
        <div class="stat"><div class="stat-num">7.4h</div><div class="stat-label">Avg Sleep</div></div>
        <div class="stat"><div class="stat-num">2.1k</div><div class="stat-label">Calories</div></div>
        <div class="stat"><div class="stat-num">94%</div><div class="stat-label">Hydration</div></div>
      </div>
    </div>
  </div>
  <!-- ↑ COPY TO HERE -->


  <!-- =========================================================== -->
  <!--  EXAMPLE 2 — EDITABLE LIST (saves + syncs automatically)     -->
  <!--  Add items, check them off, edit text, delete. Everything    -->
  <!--  is saved to this browser AND synced to your other devices.  -->
  <!--  COPY FROM HERE ↓                                            -->
  <!-- =========================================================== -->
  <div class="section">
    <div class="section-title">My List</div>
    <div class="gm-card">
      <ul class="goal-list" id="itemList"></ul>

      <div class="gm-input-wrap">
        <input class="gm-input" id="itemInput" type="text"
               placeholder="Add an item…" autocomplete="off">
        <button class="gm-add" id="itemAdd" type="button">Add</button>
      </div>
    </div>
  </div>
  <!-- ↑ COPY TO HERE -->

</div><!-- /.page -->

<script>
/* =============================================================== */
/*  EXAMPLE 2 LOGIC — the editable list above.                     */
/*                                                                 */
/*  HOW IT SAVES + SYNCS:                                          */
/*   • SECTION_ID is the unique name for this section's data.      */
/*     If you copy this block to make a NEW section, give it a     */
/*     DIFFERENT SECTION_ID (e.g. 'books', 'habits') so the two    */
/*     lists don't overwrite each other.                           */
/*   • We save to localStorage (this device) and then hand the     */
/*     key to initCloudSync(), which mirrors it to every device    */
/*     via Supabase — exactly like the other dashboard pages.      */
/* =============================================================== */
(function () {
  'use strict';

  // 👇 Change this when you copy the block to make a new section.
  const SECTION_ID = 'template_list';

  const STORE_KEY = 'tpl:' + SECTION_ID; // localStorage key for this list

  const listEl  = document.getElementById('itemList');
  const inputEl = document.getElementById('itemInput');
  const addEl   = document.getElementById('itemAdd');

  // --- load / save -------------------------------------------------
  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch (e) { return []; }
  }
  function save(items) {
    // Writing to localStorage automatically triggers a cloud-sync push
    // (see initCloudSync at the bottom).
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
  }

  // --- render ------------------------------------------------------
  function render() {
    const items = load();
    listEl.innerHTML = '';

    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty-state';
      li.textContent = 'Nothing here yet — add your first item below.';
      listEl.appendChild(li);
      return;
    }

    items.forEach(function (item, i) {
      const li = document.createElement('li');
      li.className = 'gm-row' + (item.done ? ' gm-row-done' : '');

      // checkbox
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'gm-check';
      cb.checked = !!item.done;
      cb.addEventListener('change', function () {
        const list = load(); list[i].done = cb.checked; save(list); render();
      });

      // editable text
      const txt = document.createElement('div');
      txt.className = 'gm-text';
      txt.textContent = item.text;
      txt.contentEditable = 'true';
      txt.addEventListener('blur', function () {
        const list = load(); list[i].text = txt.textContent.trim(); save(list);
      });
      txt.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); txt.blur(); }
      });

      // delete
      const del = document.createElement('button');
      del.className = 'goal-delete';
      del.type = 'button';
      del.textContent = '×';
      del.addEventListener('click', function () {
        const list = load(); list.splice(i, 1); save(list); render();
      });

      li.append(cb, txt, del);
      listEl.appendChild(li);
    });
  }

  // --- add ---------------------------------------------------------
  function add() {
    const text = inputEl.value.trim();
    if (!text) return;
    const list = load();
    list.push({ text: text, done: false });
    save(list);
    inputEl.value = '';
    render();
  }
  addEl.addEventListener('click', add);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') add();
  });

  render();

  // --- cloud sync --------------------------------------------------
  // Mirrors STORE_KEY to all your devices. `appKey` is this page's row
  // in Supabase — give each NEW page its own appKey. onApplied re-draws
  // the list when an update arrives from another device.
  if (window.initCloudSync) {
    window.initCloudSync({
      appKey: 'template',          // 👈 unique per page (e.g. 'reading', 'habits')
      syncedKeys: [STORE_KEY],     // exact localStorage keys to sync
      // syncedPrefixes: ['tpl:'], // …or sync every key starting with a prefix
      onApplied: render
    });
  }
})();
</script>

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CHEAT SHEET — building blocks you can copy anywhere           ║
  ╠══════════════════════════════════════════════════════════════╣
  ║  Section heading:                                              ║
  ║    <div class="section-title">My Heading</div>                 ║
  ║                                                                ║
  ║  Glass card wrapper:                                           ║
  ║    <div class="gm-card"> …your content… </div>                 ║
  ║                                                                ║
  ║  Big number / KPI:                                             ║
  ║    <span class="gm-progress-num">42</span>                     ║
  ║                                                                ║
  ║  Metric tiles:                                                 ║
  ║    <div class="stat-grid">                                     ║
  ║      <div class="stat"><div class="stat-num">7</div>           ║
  ║        <div class="stat-label">Label</div></div>               ║
  ║    </div>                                                      ║
  ║                                                                ║
  ║  Pill / tag:   <span class="gm-streak">🔥 Tag</span>           ║
  ║  Buttons:      <button class="gm-add">Primary</button>         ║
  ║                <button class="gm-ghost">Secondary</button>     ║
  ║  Input:        <input class="gm-input" placeholder="…">        ║
  ║                                                                ║
  ║  Colors (use the variables, never hard-code):                  ║
  ║    var(--text-primary)   bright text / numbers                 ║
  ║    var(--text-secondary) normal text                           ║
  ║    var(--text-tertiary)  labels / hints                        ║
  ║    var(--success)        green   var(--warning) amber          ║
  ║    var(--danger)         red                                   ║
  ╚══════════════════════════════════════════════════════════════╝
-->
</body>
</html>

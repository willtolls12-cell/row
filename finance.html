<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Finance — Vitality (standalone)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opt@1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#000000; --bg-elevated:#0a0a0a; --fg:#ffffff;
  --mint:#6EE7B7; --mint-hover:#5dd6a6; --mint-deep:#1f4d3d;
  --mint-glow:rgba(110,231,183,0.4); --mint-ink:#042a1c;
  --amber:#F59E0B; --amber-warm:#d97706; --wine:#7c2d12; --red:#EF4444;
  --muted:rgba(255,255,255,0.5); --muted-strong:rgba(255,255,255,0.7);
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
  --card:rgba(255,255,255,0.02); --card-elevated:rgba(255,255,255,0.04);
  --space-1:0.25rem; --space-2:0.5rem; --space-3:0.75rem; --space-4:1rem;
  --space-5:1.25rem; --space-6:1.5rem; --space-8:2rem; --space-10:2.5rem;
  --space-12:3rem; --space-16:4rem;
  --radius-sm:6px; --radius-md:8px; --radius-lg:12px; --radius-xl:18px; --radius-pill:999px;
  --text-xs:0.75rem; --text-sm:0.875rem; --text-base:1rem; --text-lg:1.125rem;
  --text-xl:1.375rem; --text-2xl:1.75rem; --text-3xl:2.5rem;
  --ease:cubic-bezier(0.2,0.8,0.2,1);
  --ease-premium:cubic-bezier(0.16,1,0.3,1);
  --ease-out-soft:cubic-bezier(0.32,0.72,0,1);
  --duration-fast:120ms; --duration:180ms; --duration-lift:480ms;
  --font-inter:'Inter'; --font-serif:'Newsreader'; --font-mono:'JetBrains Mono';
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--bg); color:var(--fg);
  font-family:var(--font-inter),-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:var(--text-base); line-height:1.5;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility; accent-color:var(--mint);
  -webkit-user-select:none; user-select:none;
}
input,textarea,select{caret-color:var(--mint);}
::selection{background:rgba(110,231,183,0.25);}
input,textarea,select,.selectable,.selectable *{-webkit-user-select:text;user-select:text;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}

.grain-overlay{position:relative;}
.grain-overlay::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:0.035;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-size:200px 200px;
}

/* --- Page shell --- */
.page{position:relative;min-height:100dvh;background:transparent;color:var(--fg);padding:var(--space-6) var(--space-5) var(--space-16);}

/* --- WelcomeBackdrop: aurora wash + distant mountains + drifting particles --- */
#backdrop{position:fixed;inset:0;z-index:0;pointer-events:none;}
.wb-atmosphere{position:fixed;inset:0;z-index:0;pointer-events:none;background-repeat:no-repeat;background-size:100% 100%;
  background-image:
    radial-gradient(60% 50% at 50% 30%, rgba(110,231,183,0.16) 0%, rgba(110,231,183,0.06) 32%, rgba(110,231,183,0) 65%),
    radial-gradient(28% 22% at 50% 38%, rgba(255,226,181,0.07) 0%, rgba(255,226,181,0) 70%),
    radial-gradient(120% 80% at 50% 100%, rgba(14,38,30,0.5) 0%, rgba(4,6,10,0.95) 75%);}
.wb-mountains{position:fixed;left:0;right:0;bottom:0;z-index:1;height:30vh;min-height:180px;pointer-events:none;opacity:0.8;}
.wb-mountains svg{width:100%;height:100%;display:block;}
.wb-particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.wb-particles span{position:absolute;width:1.5px;height:1.5px;background:rgba(233,239,233,0.7);border-radius:50%;animation:wb-drift linear infinite;box-shadow:0 0 6px rgba(167,243,208,0.5);}
@keyframes wb-drift{0%{transform:translate3d(0,0,0);opacity:0;}10%{opacity:0.7;}90%{opacity:0.55;}100%{transform:translate3d(var(--dx,12px),var(--dy,-100vh),0);opacity:0;}}
@media(prefers-reduced-motion:reduce){.wb-particles span{animation:none;}}
.shell{max-width:980px;margin:0 auto;position:relative;z-index:5;padding-bottom:90px;}

/* --- Header --- */
.header{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--space-4);margin-bottom:var(--space-6);flex-wrap:wrap;}
.headerLeft{display:flex;flex-direction:column;gap:var(--space-2);}
.back{display:inline-flex;align-items:center;gap:var(--space-2);align-self:flex-start;padding:6px 12px 6px 8px;background:rgba(110,231,183,0.08);border:1px solid rgba(110,231,183,0.20);border-radius:var(--radius-pill);color:var(--mint);font-size:var(--text-xs);font-weight:500;letter-spacing:0.02em;text-decoration:none;transition:background var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium);}
.back:hover{background:rgba(110,231,183,0.14);border-color:rgba(110,231,183,0.32);}
.backArrow{font-size:14px;line-height:1;}
.title{font-family:var(--font-serif);font-style:italic;font-size:var(--text-3xl);font-weight:400;line-height:1.05;color:var(--fg);margin:0;}
.subtitle{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin:0;}
.headerRight{display:flex;align-items:center;gap:var(--space-3);}
.currencySeg{display:inline-flex;align-items:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px;}
.currencyBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;letter-spacing:0.04em;padding:5px 11px;border-radius:var(--radius-pill);cursor:pointer;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium);}
.currencyBtn:hover{color:var(--muted-strong);}
.currencyBtnActive,.currencyBtnActive:hover{background:var(--mint);color:var(--mint-ink);}
.keyBtn{appearance:none;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted-strong);border-radius:var(--radius-pill);padding:6px 12px;font-size:11px;letter-spacing:0.04em;cursor:pointer;transition:border-color var(--duration) var(--ease),color var(--duration) var(--ease);}
.keyBtn:hover{color:var(--fg);border-color:var(--border-strong);}
.keyBtn.set{color:var(--mint);border-color:rgba(110,231,183,0.30);background:rgba(110,231,183,0.06);}

/* --- Section --- */
.section{margin-bottom:var(--space-10);}
.sectionEyebrow{font-family:var(--font-serif);font-style:italic;font-size:var(--text-lg);color:var(--muted-strong);margin-bottom:var(--space-3);display:flex;align-items:baseline;justify-content:space-between;}
.sectionEyebrow .sectionCount{font-family:var(--font-inter),system-ui;font-style:normal;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);}
.sectionCountSep{color:var(--mint);font-weight:600;letter-spacing:0.08em;}

/* --- NW hero --- */
.nwHero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);}
.nwHeroFirstRun{align-items:stretch;}
.nwHeroMain{flex:1;min-width:0;}
.nwHeroLabel{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.nwHeroNumRow{display:inline-flex;align-items:baseline;gap:var(--space-3);flex-wrap:wrap;}
.nwHeroNum{font-size:38px;font-weight:700;line-height:1.05;margin-top:4px;font-variant-numeric:tabular-nums;min-width:0;overflow-wrap:anywhere;}
.nwHeroBreakdown{font-size:11px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums;}
.firstRunHint{margin-top:var(--space-3);font-size:13px;color:var(--muted-strong);line-height:1.45;max-width:36ch;}
.nwHeroLiab{margin-top:var(--space-2);font-size:var(--text-sm);color:var(--muted-strong);font-variant-numeric:tabular-nums;}
.nwHeroLiabSep{color:var(--muted);} .nwHeroDebt{color:var(--red);}
.nwHeroRunway{margin-top:var(--space-2);font-family:var(--font-mono,monospace);font-size:var(--text-xs);letter-spacing:0.04em;color:var(--muted-strong);}
.nwHeroRunway strong{color:var(--mint);font-weight:700;}
.dailyDelta{display:inline-flex;align-items:baseline;gap:6px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:0.02em;padding:3px 9px;border-radius:var(--radius-pill);border:1px solid transparent;background:rgba(255,255,255,0.04);color:var(--muted-strong);white-space:nowrap;}
.dailyDelta.up{background:rgba(110,231,183,0.10);border-color:rgba(110,231,183,0.22);color:var(--mint);}
.dailyDelta.down{background:rgba(239,68,68,0.10);border-color:rgba(239,68,68,0.22);color:var(--red);}
.dailyDelta.flat{color:var(--muted);font-style:italic;}
.dailyDeltaPct{font-weight:500;opacity:0.8;}
.dailyDeltaWindow{font-size:10px;font-weight:400;letter-spacing:0.06em;text-transform:uppercase;color:inherit;opacity:0.55;}

/* --- Goal ring --- */
.goalRing{position:relative;display:inline-grid;place-items:center;width:60px;height:60px;flex:0 0 auto;padding:0;background:none;border:none;cursor:pointer;}
.goalRingSvg{position:absolute;inset:0;width:60px;height:60px;}
.goalTrack{stroke:rgba(255,255,255,0.10);stroke-width:5;}
.goalProgress{stroke:var(--mint);stroke-width:5;transition:stroke-dasharray 600ms var(--ease-premium);filter:drop-shadow(0 0 4px var(--mint-glow));}
.goalCenter{font-size:0.74rem;font-weight:700;color:var(--mint);font-variant-numeric:tabular-nums;line-height:1;}
.goalSet{align-self:center;background:rgba(110,231,183,0.06);border:1px solid rgba(110,231,183,0.20);border-radius:var(--radius-pill);color:var(--mint);font-size:var(--text-xs);font-family:inherit;padding:5px 12px;cursor:pointer;white-space:nowrap;transition:background var(--duration) var(--ease),border-color var(--duration) var(--ease);}
.goalSet:hover{background:rgba(110,231,183,0.12);border-color:rgba(110,231,183,0.40);}
.goalInput{width:150px;background:rgba(255,255,255,0.04);border:1px solid rgba(110,231,183,0.40);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);color:var(--fg);font-size:var(--text-sm);font-family:inherit;}
.goalInput:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 3px rgba(110,231,183,0.12);}

/* --- Import trigger --- */
.importTrigger{display:inline-flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);border:1px solid var(--border);border-radius:var(--radius-lg);background:linear-gradient(180deg,rgba(110,231,183,0.06) 0%,var(--card) 100%);color:var(--fg);cursor:pointer;text-align:left;transition:border-color var(--duration) var(--ease),background var(--duration) var(--ease),transform var(--duration) var(--ease),box-shadow var(--duration) var(--ease);font-family:inherit;}
.importTrigger:hover{border-color:var(--mint-glow);background:linear-gradient(180deg,rgba(110,231,183,0.12) 0%,var(--card-elevated) 100%);transform:translateY(-1px);box-shadow:0 0 32px -16px var(--mint-glow);}
.importTriggerIcon{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:var(--mint);color:#000;font-family:var(--font-serif),Georgia,serif;font-style:italic;font-size:18px;flex-shrink:0;}
.importTriggerText{display:flex;flex-direction:column;gap:1px;}
.importTriggerTitle{font-size:var(--text-sm);font-weight:600;color:var(--fg);}
.importTriggerSub{font-size:11px;color:var(--muted);letter-spacing:0.02em;}
.section > .importTrigger{margin-bottom:var(--space-3);}
.importTriggerLarge{padding:var(--space-4) var(--space-5);gap:var(--space-4);border-color:rgba(110,231,183,0.28);background:linear-gradient(180deg,rgba(110,231,183,0.14) 0%,rgba(110,231,183,0.04) 100%);box-shadow:0 0 32px -18px var(--mint-glow);align-self:stretch;min-width:280px;}
.importTriggerLarge:hover{border-color:rgba(110,231,183,0.48);background:linear-gradient(180deg,rgba(110,231,183,0.22) 0%,rgba(110,231,183,0.06) 100%);box-shadow:0 0 48px -16px var(--mint-glow);}
.importTriggerLarge .importTriggerIcon{width:44px;height:44px;font-size:24px;}
.importTriggerLarge .importTriggerTitle{font-size:var(--text-base);}
.importTriggerLarge .importTriggerSub{font-size:12px;color:var(--muted-strong);}
@media(max-width:560px){.importTrigger{width:100%;}}
/* --- Overview grid --- */
.overviewGrid{display:grid;grid-template-columns:1.6fr 1fr;gap:var(--space-4);margin-bottom:var(--space-4);}
@media(max-width:720px){.overviewGrid{grid-template-columns:1fr;}}
.chartWrap,.donutWrap{position:relative;padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);}
.chartHead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--space-3);gap:var(--space-3);flex-wrap:wrap;}
.chartHeadLeft{display:inline-flex;align-items:baseline;gap:var(--space-3);}
.chartLabel{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;}
.chartDelta{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
.chartDelta.up{color:var(--mint);} .chartDelta.down{color:var(--red);}
.periodSeg{display:inline-flex;align-items:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-pill);padding:2px;gap:1px;}
.periodBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.06em;padding:4px 9px;border-radius:var(--radius-pill);cursor:pointer;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium);}
.periodBtn:hover{color:var(--muted-strong);}
.periodBtnActive,.periodBtnActive:hover{background:var(--mint);color:var(--mint-ink);}
.chartSvg{display:block;width:100%;height:140px;color:var(--mint);}
.chartGrid{stroke:rgba(255,255,255,0.04);stroke-width:0.5;}
.chartLineStroke{filter:drop-shadow(0 0 6px currentColor);}
.chartLineDraw{stroke-dasharray:1;stroke-dashoffset:1;animation:nwLineDraw 1000ms var(--ease-premium) forwards;}
@keyframes nwLineDraw{to{stroke-dashoffset:0;}}
.chartArea{opacity:0;animation:nwAreaFade 760ms var(--ease-premium) 220ms forwards;}
@keyframes nwAreaFade{to{opacity:1;}}
.chartEmpty{font-family:var(--font-serif);font-style:italic;text-align:center;color:var(--muted);font-size:var(--text-sm);padding:var(--space-6) 0;}
.chartStatsRow{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--border);}
.chartStat{display:flex;flex-direction:column;gap:2px;}
.chartStatLabel{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.chartStatVal{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--fg);}

/* --- Donut --- */
.donutStage{position:relative;display:flex;align-items:center;justify-content:center;margin:var(--space-3) 0;}
.donutSvg{width:160px;height:160px;}
.donutCenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.donutNum{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.donutSub{font-family:var(--font-serif);font-style:italic;font-size:11px;color:var(--muted);margin-top:2px;}
.donutEmpty{font-family:var(--font-serif);font-style:italic;text-align:center;color:var(--muted);font-size:var(--text-sm);padding:var(--space-3) 0;}
.donutLegend{display:flex;flex-direction:column;gap:6px;margin-top:var(--space-2);}
.donutLeg{display:grid;grid-template-columns:12px 1fr auto;align-items:center;gap:8px;font-size:11px;color:var(--muted-strong);}
.donutLegDot{width:8px;height:8px;border-radius:50%;}
.donutLegPct{font-variant-numeric:tabular-nums;color:var(--muted);}

/* --- Account cards --- */
.accountsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4);}
@media(max-width:720px){.accountsGrid{grid-template-columns:1fr;}}
.accountCard{display:flex;flex-direction:column;gap:var(--space-3);padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);}
.accountHead{display:flex;align-items:baseline;justify-content:space-between;}
.accountLabel{font-family:var(--font-serif);font-style:italic;font-size:var(--text-base);color:var(--muted-strong);}
.accountTotal{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;}
.accountTotalDebt{color:var(--red);}
.accountTotalPct{font-size:10px;font-weight:400;letter-spacing:0.04em;color:var(--muted);margin-left:6px;font-variant-numeric:tabular-nums;}
.accountList{display:flex;flex-direction:column;gap:2px;}
.accountRow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:var(--space-3);padding:8px 10px;border-radius:var(--radius-md);transition:background var(--duration) var(--ease-premium);}
.accountRow:hover{background:rgba(255,255,255,0.02);}
.accountRowName{font-size:13px;color:var(--fg);cursor:pointer;border-radius:4px;padding:2px 4px;margin-left:-4px;}
.accountRowName:hover{background:rgba(110,231,183,0.06);}
.accountRowAmount{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;cursor:pointer;text-align:right;border-radius:4px;padding:2px 4px;color:var(--fg);}
.accountRowAmount:hover{background:rgba(110,231,183,0.06);}
.accountRowName,.accountRowAmount,.holdingShares{text-decoration:underline dotted rgba(110,231,183,0.22);text-underline-offset:3px;}
.inlineEditInput{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(110,231,183,0.3);border-radius:4px;padding:3px 6px;color:var(--fg);font-family:inherit;font-size:13px;outline:none;font-variant-numeric:tabular-nums;}
.inlineEditAmt{text-align:right;width:110px;}
.deleteBtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;line-height:1;padding:4px 7px;border-radius:var(--radius-md);cursor:pointer;transition:color var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium);}
.deleteBtn:hover{color:var(--red);border-color:rgba(239,68,68,0.35);}
.quickAdd{display:grid;grid-template-columns:1fr 110px auto;gap:6px;align-items:stretch;}
.quickAddInput{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 10px;color:var(--fg);font-family:inherit;font-size:13px;outline:none;transition:border-color var(--duration) var(--ease-premium);}
.quickAddInput::placeholder{color:var(--muted);}
.quickAddInput:focus{border-color:rgba(110,231,183,0.4);}
.quickAddBtn{background:var(--mint);border:0;color:var(--mint-ink);font-family:inherit;font-size:13px;font-weight:600;border-radius:var(--radius-md);padding:0 14px;cursor:pointer;transition:background var(--duration) var(--ease-premium);}
.quickAddBtn:hover{background:var(--mint-hover);}
.quickAddBtn:disabled{opacity:0.4;cursor:not-allowed;}
.quickAddInputAlert{border-color:rgba(245,158,11,0.45)!important;box-shadow:0 0 0 1px rgba(245,158,11,0.15);}
.addToggle{align-self:flex-start;background:transparent;border:1px dashed var(--border);border-radius:var(--radius-md);color:var(--muted);font-family:inherit;font-size:12px;letter-spacing:0.02em;padding:6px 12px;cursor:pointer;transition:color var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium),background var(--duration) var(--ease-premium);}
.addToggle:hover{color:var(--mint);border-color:rgba(110,231,183,0.35);background:rgba(110,231,183,0.04);border-style:solid;}
.holdingRow{display:grid;grid-template-columns:auto 64px 1fr auto auto;align-items:center;gap:var(--space-3);padding:8px 10px;border-radius:var(--radius-md);transition:background var(--duration) var(--ease-premium);}
.holdingRow:hover{background:rgba(255,255,255,0.02);}
.tickerPill{font-family:var(--font-mono,ui-monospace,monospace);font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--mint);background:rgba(110,231,183,0.08);border:1px solid rgba(110,231,183,0.22);padding:3px 7px;border-radius:var(--radius-pill);text-transform:uppercase;}
.holdingShares{font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted-strong);cursor:pointer;border-radius:4px;padding:2px 4px;text-align:right;}
.holdingShares:hover{background:rgba(110,231,183,0.06);}
.holdingSharesInput{width:64px;text-align:right;}
.holdingPrice{display:inline-flex;align-items:baseline;gap:6px;font-size:12px;font-variant-numeric:tabular-nums;color:var(--muted);}
.holdingChange{font-size:11px;font-weight:500;}
.holdingChange.up{color:var(--mint);} .holdingChange.down{color:var(--red);}
.holdingStale{font-size:10px;letter-spacing:0.04em;color:var(--muted);font-variant-numeric:normal;}
.holdingsFooter{display:flex;justify-content:space-between;align-items:center;gap:var(--space-3);padding:4px 2px 0;}
.linkAction{background:transparent;border:0;padding:4px 0;color:var(--muted-strong);font-family:inherit;font-size:11px;letter-spacing:0.02em;cursor:pointer;transition:color var(--duration) var(--ease-premium);}
.linkAction:hover{color:var(--mint);}
.sparkline{display:inline-block;vertical-align:middle;color:var(--muted);margin-right:4px;}
.sparkline.up{color:var(--mint);} .sparkline.down{color:var(--red);}
.cryptoHint{margin-top:var(--space-2);font-size:var(--text-xs);color:var(--muted-strong);line-height:1.45;}
/* --- Activity --- */
.activity{margin-top:var(--space-5);padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);}
.activityHead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-3);}
.activityList{display:flex;flex-direction:column;gap:0;}
.activityBucket{display:flex;flex-direction:column;}
.activityBucket + .activityBucket{margin-top:var(--space-3);}
.activityBucketLabel{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);font-weight:500;padding:4px 0 2px;}
.activityRow{display:grid;grid-template-columns:4px 1fr auto auto;align-items:center;gap:var(--space-3);padding:10px 0;border-bottom:1px solid var(--border);}
.activityRow:last-child{border-bottom:0;}
.activityBar{width:3px;height:24px;border-radius:2px;}
.activityInfo{min-width:0;}
.activityName{font-size:13px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.activityMeta{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.activityAmt{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;}
.activityAmt.up{color:var(--mint);} .activityAmt.down{color:var(--red);}
.activityDate{font-size:11px;color:var(--muted);min-width:50px;text-align:right;}
.activityEmpty{font-family:var(--font-serif);font-style:italic;color:var(--muted);text-align:center;padding:var(--space-5) 0;}

/* --- Ticker --- */
.ticker{display:flex;align-items:center;gap:var(--space-3);padding:8px 14px;background:rgba(110,231,183,0.04);border:1px solid rgba(110,231,183,0.15);border-radius:var(--radius-pill);margin-bottom:var(--space-5);overflow:hidden;}
.ticker.urgent{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.25);}
.tickerTag{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--mint);font-weight:600;flex-shrink:0;}
.ticker.urgent .tickerTag{color:var(--amber);}
.tickerStream{position:relative;flex:1;height:18px;overflow:hidden;}
.tickerItem{position:absolute;inset:0;display:flex;align-items:center;gap:var(--space-3);opacity:0;transform:translateY(8px);transition:opacity 400ms var(--ease-premium),transform 400ms var(--ease-premium);font-size:12px;}
.tickerItem.active{opacity:1;transform:translateY(0);}
.tickerItemName{color:var(--fg);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%;}
.tickerItemAmt{color:var(--muted-strong);font-variant-numeric:tabular-nums;}
.tickerItemDays{margin-left:auto;color:var(--muted);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;}
.ticker.urgent .tickerItemDays{color:var(--amber);}
.tickerDots{display:flex;gap:3px;flex-shrink:0;}
.tickerDot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.15);}
.tickerDot.active{background:var(--mint);}
.ticker.urgent .tickerDot.active{background:var(--amber);}

/* --- Subs --- */
.subsHero{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);}
.subsHeroNum{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px;}
.subsHeroNumSuffix{font-size:13px;color:var(--muted);font-weight:500;margin-left:4px;}
.subsHeroSub{font-size:11px;color:var(--muted);margin-top:4px;}
.subRow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:var(--space-3);padding:12px 14px;background:rgba(255,255,255,0.025);border-radius:var(--radius-md);margin-bottom:8px;}
.subRow.urgent{background:rgba(245,158,11,0.06);box-shadow:inset 2px 0 0 var(--amber);}
.subRowName{font-size:14px;font-weight:600;color:var(--fg);}
.subRowPeriod{font-size:11px;color:var(--muted);margin-top:2px;text-transform:capitalize;}
.subRowRenew{font-size:10px;color:var(--amber);margin-top:3px;}
.subRowPills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.subPill{font-size:10px;letter-spacing:0.04em;padding:3px 8px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.04);color:var(--muted-strong);}
.subRowCost{text-align:right;line-height:1.15;}
.subRowCostBig{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.subRowCostUnit{font-size:10px;color:var(--muted);margin-top:1px;}
.subRowCostBilled{font-size:10px;color:var(--muted);margin-top:2px;}
.subRowActions{display:flex;flex-direction:column;gap:4px;align-items:center;}
.subEditGrid{display:grid;gap:var(--space-2);grid-template-columns:1fr 1fr;min-width:0;}
.iconBtn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;line-height:1;padding:3px 7px;border-radius:var(--radius-md);cursor:pointer;font-family:inherit;transition:color var(--duration) var(--ease-premium),border-color var(--duration) var(--ease-premium);}
.iconBtn:hover{color:var(--fg);border-color:var(--border-strong);}
.subToggle{appearance:none;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:10px;letter-spacing:0.04em;padding:3px 8px 3px 6px;border-radius:var(--radius-pill);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all var(--duration) var(--ease-premium);}
.subToggle.on{background:rgba(110,231,183,0.10);color:var(--mint);border-color:rgba(110,231,183,0.28);}
.subToggleDot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.subToggle.on .subToggleDot{background:var(--mint);box-shadow:0 0 4px var(--mint-glow);}

/* --- Add cards --- */
.addCard{padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);}
.addCardHead{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-3);flex-wrap:wrap;}
.addEyebrow{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}
.modeSeg{display:inline-flex;align-items:center;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-pill);padding:3px;gap:2px;}
.modeBtn{appearance:none;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;letter-spacing:0.02em;padding:6px 14px;border-radius:var(--radius-pill);cursor:pointer;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium);}
.modeBtn:hover{color:var(--muted-strong);}
.modeBtnActive,.modeBtnActive:hover{background:var(--mint);color:var(--mint-ink);}
.addGrid{display:grid;gap:8px;grid-template-columns:1.4fr 0.9fr 0.7fr 0.9fr 1.1fr auto;align-items:stretch;}
.addGridBought{grid-template-columns:1.4fr 0.9fr 1fr auto;}
.addGridIncome{grid-template-columns:1.4fr 1fr auto;}
.addGridSub{grid-template-columns:1.4fr 0.9fr 0.7fr 0.9fr 1.1fr auto;}
.addGridWish{grid-template-columns:2fr 1fr auto;}
@media(max-width:720px){.addGrid,.addGridBought,.addGridIncome,.addGridSub,.addGridWish{grid-template-columns:1fr 1fr;}}
.addPreview{font-size:11px;color:var(--muted);margin-top:var(--space-3);font-family:var(--font-serif);font-style:italic;}
.addPreview.warn{color:var(--amber);} .addPreview.bad{color:var(--red);}

/* --- Orders --- */
.ordCard{padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-3);display:flex;flex-direction:column;gap:var(--space-3);}
.ordCard.deducted{opacity:0.65;}
.ordIncome{border-left:2px solid var(--mint);}
.ordHead{display:grid;grid-template-columns:1fr auto auto;gap:var(--space-3);align-items:baseline;}
.ordName{font-size:var(--text-base);font-weight:600;color:var(--fg);}
.ordCard.deducted .ordName{text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.25);}
.ordAmt{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;}
.ordAmt.up{color:var(--mint);}
.ordMetaRow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.ordPill{font-size:10px;letter-spacing:0.04em;padding:4px 9px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.04);color:var(--muted-strong);}
.ordPill.good{background:rgba(110,231,183,0.10);color:var(--mint);}
.ordPill.warn{background:rgba(245,158,11,0.10);color:var(--amber);}
.ordPill.bad{background:rgba(239,68,68,0.10);color:var(--red);}
.ordPill.up{background:rgba(110,231,183,0.10);color:var(--mint);}
.ordPill.frozen{opacity:0.55;text-decoration:line-through;}
.ordDate.today{background:rgba(110,231,183,0.10);color:var(--mint);}
.ordDate.imminent{background:rgba(245,158,11,0.10);color:var(--amber);}
.ordDate.past{background:rgba(239,68,68,0.10);color:var(--red);}
.ordFoot{display:flex;justify-content:flex-end;gap:6px;margin-top:4px;}
.ordDeductBtn{background:transparent;border:1px solid var(--border-strong);color:var(--muted-strong);font-family:inherit;font-size:12px;padding:6px 12px;border-radius:var(--radius-pill);cursor:pointer;transition:all var(--duration) var(--ease-premium);}
.ordDeductBtn:hover{border-color:var(--red);color:var(--red);}
.ordDeductedPill{font-size:11px;padding:6px 12px;border-radius:var(--radius-pill);background:rgba(110,231,183,0.08);color:var(--mint);}

/* --- Wishlist --- */
.wishHero{padding:var(--space-5);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);}
.wishHeroTop{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);}
.wishHeroNum{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px;}
.wishHeroPctNum{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--mint);text-align:right;}
.wishHeroPctNum.warn{color:var(--amber);} .wishHeroPctNum.bad{color:var(--red);}
.wishHeroBar{height:6px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.05);overflow:hidden;}
.wishHeroBarFill{height:100%;background:var(--mint);transition:width 320ms var(--ease-premium);}
.wishHeroBarFill.warn{background:var(--amber);} .wishHeroBarFill.bad{background:var(--red);}
.wishHeroFoot{font-size:11px;color:var(--muted);font-family:var(--font-serif);font-style:italic;margin-top:var(--space-3);}
.wishRow{padding:var(--space-3) var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-2);display:flex;flex-direction:column;gap:var(--space-2);}
.wishRowH{display:grid;grid-template-columns:1fr auto auto;gap:var(--space-3);align-items:center;}
.wishRowName{font-size:var(--text-base);font-weight:600;}
.wishRowMeta{font-size:11px;color:var(--muted);margin-top:2px;}
.wishRowAmtWrap{text-align:right;}
.wishRowAmt{font-size:var(--text-base);font-weight:600;font-variant-numeric:tabular-nums;}
.wishRowPct{font-size:11px;color:var(--mint);margin-top:2px;}
.wishRowPct.warn{color:var(--amber);} .wishRowPct.bad{color:var(--red);}
.wishRowBar{height:3px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.04);overflow:hidden;}
.wishRowBarFill{height:100%;background:var(--mint);transition:width 320ms var(--ease-premium);}
.wishRowBarFill.warn{background:var(--amber);} .wishRowBarFill.bad{background:var(--red);}

/* --- Empty / bills / alerts / insights --- */
.emptyState{padding:var(--space-8) var(--space-5);text-align:center;background:var(--card);border:1px dashed var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);}
.emptyTitle{font-family:var(--font-serif);font-style:italic;font-size:var(--text-lg);color:var(--muted-strong);margin-bottom:var(--space-2);}
.emptyBody{font-size:12px;color:var(--muted);max-width:36ch;margin:0 auto;line-height:1.5;}
.billsCard{padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);}
.billsHead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--space-2);}
.billsTotal{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--mint);}
.billsTotalSub{font-size:10px;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-left:6px;}
.billsList{display:flex;flex-direction:column;}
.billRow{display:grid;grid-template-columns:10px 1fr auto;align-items:center;gap:var(--space-3);padding:9px 0;border-bottom:1px solid var(--border);}
.billRow:last-child{border-bottom:0;}
.billDot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.billDot.soon{background:var(--mint);}
.billDot.imminent{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.billInfo{min-width:0;}
.billName{font-size:13px;font-weight:500;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.billWhen{font-size:11px;color:var(--muted);margin-top:1px;}
.billWhen.soon{color:var(--mint);} .billWhen.imminent{color:var(--amber);}
.billAmt{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--fg);}
.alertsCard{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4);}
.alertRow{display:flex;align-items:center;gap:var(--space-3);padding:10px 12px;border-radius:var(--radius-md);border:1px solid transparent;font-size:12px;line-height:1.4;}
.alertTrial{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.22);}
.alertHike{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.20);}
.alertTag{flex-shrink:0;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;padding:3px 8px;border-radius:var(--radius-pill);}
.alertTrial .alertTag{background:rgba(245,158,11,0.16);color:var(--amber);}
.alertHike .alertTag{background:rgba(239,68,68,0.16);color:var(--red);}
.alertText{color:var(--muted-strong);min-width:0;font-variant-numeric:tabular-nums;}
.alertName{color:var(--fg);font-weight:600;} .alertSub{color:var(--muted);}
.insightsCard{padding:var(--space-4);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--space-4);}
.insightsHead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-3);margin-bottom:var(--space-3);}
.insightsTotal{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px;}
.insightsDelta{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;padding:3px 9px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.04);}
.insightsDelta.up{color:var(--mint);background:rgba(110,231,183,0.10);}
.insightsDelta.down{color:var(--red);background:rgba(239,68,68,0.10);}
.cashflowRow{display:flex;flex-wrap:wrap;align-items:baseline;gap:var(--space-3);margin-bottom:var(--space-3);font-size:var(--text-sm);font-variant-numeric:tabular-nums;}
.cashflowIn{color:var(--mint);font-weight:600;} .cashflowOut{color:var(--muted-strong);}
.cashflowNet{margin-left:auto;font-weight:700;} .cashflowNet.up{color:var(--mint);} .cashflowNet.down{color:var(--red);}
.cashflowSaved{color:var(--muted);font-weight:500;}
.budgetBlock{margin-bottom:var(--space-3);}
.budgetEdit{display:flex;gap:var(--space-2);align-items:center;}
.budgetBar{height:8px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.05);overflow:hidden;}
.budgetBarFill{height:100%;width:0;background:var(--mint);border-radius:var(--radius-pill);transition:width 420ms var(--ease-premium);}
.budgetBarFill.warn{background:var(--amber);} .budgetBarFill.bad{background:var(--red);}
.budgetMeta{display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-3);margin-top:6px;font-size:11px;font-variant-numeric:tabular-nums;}
.budgetMeta .up{color:var(--mint);} .budgetMeta .warn{color:var(--amber);} .budgetMeta .bad{color:var(--red);}
.catList{display:flex;flex-direction:column;gap:7px;padding-top:var(--space-3);border-top:1px solid var(--border);}
.catRow{display:grid;grid-template-columns:96px 1fr auto;align-items:center;gap:var(--space-3);}
.catName{font-size:12px;color:var(--muted-strong);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.catBarTrack{height:5px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.04);overflow:hidden;}
.catBarFill{height:100%;background:var(--mint);opacity:0.75;border-radius:var(--radius-pill);transition:width 420ms var(--ease-premium);}
.catAmt{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--fg);}

/* --- Tab bar --- */
.tabBar{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;justify-content:center;padding:var(--space-3) var(--space-4) calc(var(--space-3) + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(0,0,0,0.85) 60%,transparent);pointer-events:none;}
.tabBarInner{display:flex;gap:4px;padding:4px;background:rgba(20,20,22,0.9);border:1px solid var(--border);border-radius:var(--radius-pill);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,0.45);pointer-events:auto;}
.tab{appearance:none;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;letter-spacing:0.04em;padding:8px 16px;border-radius:var(--radius-pill);cursor:pointer;transition:background var(--duration) var(--ease-premium),color var(--duration) var(--ease-premium);}
.tab:hover{color:var(--muted-strong);}
.tab.active,.tab.active:hover{background:var(--mint);color:var(--mint-ink);}
.tabView{animation:tabFade 280ms var(--ease-premium) both;}
@keyframes tabFade{from{opacity:0;}to{opacity:1;}}

/* --- Glass pass --- */
.chartWrap,.donutWrap,.accountCard,.ordCard,.wishHero,.activity,.billsCard,.insightsCard,.addCard{
  background:linear-gradient(165deg,rgba(16,26,22,0.55) 0%,rgba(7,12,10,0.42) 100%);
  border:1px solid rgba(167,243,208,0.10);border-radius:18px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.05),0 22px 50px -30px rgba(0,0,0,0.75);
  -webkit-backdrop-filter:blur(12px) saturate(1.1);backdrop-filter:blur(12px) saturate(1.1);
  transition:border-color var(--duration) var(--ease-premium),box-shadow var(--duration) var(--ease-premium),transform var(--duration) var(--ease-premium);
}
.chartWrap:hover,.donutWrap:hover,.accountCard:hover,.wishHero:hover,.activity:hover,.billsCard:hover,.insightsCard:hover,.addCard:hover,.ordCard:not(.deducted):hover{
  border-color:rgba(110,231,183,0.30);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.07),0 0 40px -12px rgba(110,231,183,0.18),0 26px 56px -28px rgba(0,0,0,0.8);
}
.ordCard:not(.deducted):hover{transform:translateY(-2px);}
/* --- Import / keys modal --- */
.importOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:grid;place-items:center;padding:var(--space-4);animation:importFade 200ms var(--ease-premium);}
@keyframes importFade{from{opacity:0;}to{opacity:1;}}

    const keyC=MINT.clone().lerp(WARM,PARAMS.keyWarmth);const key=new THREE.DirectionalLight(keyC.getHex(),4.0);key.position.set(2.6,1.8,2.2);scene.add(key);
    const rim=new THREE.DirectionalLight(COOL_MINT.getHex(),2.2);rim.position.set(-2.8,1.2,-2.0);scene.add(rim);
    const fill=new THREE.DirectionalLight(0x88c4b0,0.6);fill.position.set(0,-2.5,1);scene.add(fill);
    // orient a face roughly dead-on (like character mode rest pose)
    mesh.rotation.x=0.55;
    function resize(){const w=canvas.clientWidth||300,h=canvas.clientHeight||300;const dpr=Math.min(window.devicePixelRatio||1,1.75);renderer.setPixelRatio(dpr);renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
    const ro=new ResizeObserver(()=>resize());ro.observe(canvas);
    const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const clock=new THREE.Clock();let t0=0.55;
    function tick(){requestAnimationFrame(tick);const dt=clock.getDelta();if(!canvas.isConnected)return;
      if(!reduce){t0+=dt;mesh.rotation.y+=PARAMS.rotationSpeed*dt;mesh.rotation.x=0.55+Math.sin(t0*0.7)*PARAMS.wobbleAmplitude;}
      renderer.render(scene,camera);}
    resize();tick();
    return {canvas,resize};
  }
  window.CoachGem={mount(stage){if(!stage)return;if(!state){state=init();if(!state)return;}if(state.canvas.parentNode!==stage){stage.appendChild(state.canvas);}state.resize();}};
  // self-mount if the coach stage is already on screen when the module finishes loading
  const stage=document.querySelector('.coach-gemStage');if(stage)window.CoachGem.mount(stage);
})();
</script>

<script>
'use strict';
/* =========================================================================
 * Finance — Vitality standalone (single file). Ported from the live
 * /app/finance module. All data starts at zero. Persists to localStorage.
 * AI features (screenshot import + coach) call Anthropic directly from the
 * browser using a key you paste in (header → keys). Crypto prices via
 * CoinGecko (no key); stock prices via Finnhub (optional key); FX via
 * open.er-api.com (no key).
 * ========================================================================= */

const STORAGE_KEY = 'vty_finance_standalone_v1';
const BUDGET_KEY = 'vty_finance_standalone_budget_v1';

const ACTIVITY_MAX = 50, NW_HISTORY_MAX = 500, PRICE_HISTORY_MAX = 30, ORDERS_MAX = 500;
const PRICE_SNAPSHOT_INTERVAL_MS = 6*60*60*1000;
const ANTHROPIC_URL = 'https://api.anthropic.com/v1/messages';
const COACH_MODEL = 'claude-opus-4-8';
const VISION_MODEL = 'claude-haiku-4-5-20251001';
const CURRENCIES = ['CHF','USD','EUR','GBP'];
const TAB_KEYS = ['net','coach'];

const COINS = [
  {id:'bitcoin',symbol:'BTC',name:'Bitcoin'},{id:'ethereum',symbol:'ETH',name:'Ethereum'},
  {id:'solana',symbol:'SOL',name:'Solana'},{id:'ripple',symbol:'XRP',name:'XRP'},
  {id:'cardano',symbol:'ADA',name:'Cardano'},{id:'dogecoin',symbol:'DOGE',name:'Dogecoin'},
  {id:'polkadot',symbol:'DOT',name:'Polkadot'},{id:'chainlink',symbol:'LINK',name:'Chainlink'},
  {id:'litecoin',symbol:'LTC',name:'Litecoin'},{id:'avalanche-2',symbol:'AVAX',name:'Avalanche'},
  {id:'polygon-ecosystem-token',symbol:'POL',name:'Polygon'},{id:'tron',symbol:'TRX',name:'TRON'},
  {id:'uniswap',symbol:'UNI',name:'Uniswap'},{id:'stellar',symbol:'XLM',name:'Stellar'},
  {id:'cosmos',symbol:'ATOM',name:'Cosmos'},{id:'monero',symbol:'XMR',name:'Monero'},
  {id:'aave',symbol:'AAVE',name:'Aave'},{id:'shiba-inu',symbol:'SHIB',name:'Shiba Inu'},
  {id:'tether',symbol:'USDT',name:'Tether'},{id:'usd-coin',symbol:'USDC',name:'USD Coin'},
];
const COIN_BY_KEY = (()=>{const m={};for(const c of COINS){m[c.id.toLowerCase()]=c;m[c.symbol.toLowerCase()]=c;m[c.name.toLowerCase()]=c;}return m;})();
function resolveCoin(input){const k=(input||'').trim().toLowerCase();return k?(COIN_BY_KEY[k]||null):null;}

const TYPE_COLORS={bank:'#6EE7B7',stocks:'#A7F3D0',crypto:'#34D399',debt:'#F87171',other:'rgba(255,255,255,0.45)'};
const SUBS_COLOR='#F59E0B';
const TYPE_LABELS={bank:'Bank',stocks:'Stocks',crypto:'Crypto',debt:'Debt',other:'Other'};

function defaultState(){return{version:1,currency:'CHF',activeTab:'net',accounts:[],subscriptions:[],orders:[],wishlist:[],activity:[],netWorthHistory:[]};}

let state = loadState();
let rates = {CHF:1,USD:1,EUR:1,GBP:1};
let stockQuotes = {};   // ticker -> {priceUSD, changePct, fetchedAt}
let cryptoQuotes = {};  // coinId -> {priceCHF, changePct, fetchedAt}
let keys = loadKeys();   // {anthropic, finnhub}
let ui = {              // ephemeral UI state
  showAdd:{}, showManualStocks:false, showManualCrypto:false, coinErr:false,
  orderMode:'incoming', editingSubId:null, chartPeriod:'ALL',
  tickerIdx:0,
};
let coach = {scored:false, score:null, reason:'', scoring:false, chatting:false, messages:[], err:null, input:'', dayKey:''};

function loadState(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){return defaultState();}
}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function loadKeys(){try{return Object.assign({anthropic:'',finnhub:''},JSON.parse(localStorage.getItem(KEYS_KEY)||'{}'));}catch(e){return{anthropic:'',finnhub:''};}}
function saveKeys(){try{localStorage.setItem(KEYS_KEY,JSON.stringify(keys));}catch(e){}}
function getBudgetCHF(){const r=localStorage.getItem(BUDGET_KEY);const n=r==null?NaN:parseFloat(r);return isFinite(n)&&n>0?n:null;}
function setBudgetCHF(v){try{if(v==null||!isFinite(v)||v<=0)localStorage.removeItem(BUDGET_KEY);else localStorage.setItem(BUDGET_KEY,String(v));}catch(e){}}
function getGoalCHF(){const r=localStorage.getItem(NW_GOAL_KEY);const n=r==null?NaN:parseFloat(r);return isFinite(n)&&n>0?n:null;}
function setGoalCHF(v){try{if(v==null||!isFinite(v)||v<=0)localStorage.removeItem(NW_GOAL_KEY);else localStorage.setItem(NW_GOAL_KEY,String(v));}catch(e){}}

/* ---- ids / dates ---- */
function newUuid(){if(typeof crypto!=='undefined'&&crypto.randomUUID)return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;const v=c==='x'?r:(r&0x3|0x8);return v.toString(16);});}
const genId=()=>newUuid();
const pad2=n=>String(n).padStart(2,'0');
function toIsoDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function getLocalDateKey(){return toIsoDate(new Date());}
function parseLocalDate(iso){if(!iso)return null;const safe=/^\d{4}-\d{2}-\d{2}$/.test(iso)?iso+'T00:00':iso;const d=new Date(safe);return isNaN(d.getTime())?null:d;}
function startOfToday(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());}
function relativeDateParts(iso){const d=parseLocalDate(iso);if(!d)return null;const ds=new Date(d.getFullYear(),d.getMonth(),d.getDate());const diffDays=Math.round((ds.getTime()-startOfToday().getTime())/86400000);const dateLabel=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});return{diffDays,dateLabel};}

/* ---- money / fx ---- */
function pctClass(p){if(p<5)return'good';if(p<25)return'warn';return'bad';}
function convertBetween(amount,from,to){if(!isFinite(amount))return 0;return amount*(rates[to]||1)/(rates[from]||1);}
function fmtMoney(amountCHF,currency){const rate=rates[currency]||1;const num=(Number(amountCHF)||0)*rate;const hasFraction=Math.abs(num%1)>0.005;
  return currency+' '+num.toLocaleString('en-US',{minimumFractionDigits:hasFraction?2:0,maximumFractionDigits:2});}
function fmt(chf){return fmtMoney(chf,state.currency);}
function displayToChf(amount,currency){const rate=rates[currency]||1;return amount/rate;}
function chfToDisplay(amountCHF,currency){const rate=rates[currency]||1;return amountCHF*rate;}
function percentBreakdown(values,total,decimals){decimals=decimals==null?1:decimals;if(total<=0)return values.map(()=>0);
  const factor=Math.pow(10,decimals);const exact=values.map(v=>v/total*100*factor);const floored=exact.map(Math.floor);
  let remainder=Math.round(100*factor)-floored.reduce((a,b)=>a+b,0);
  const byFrac=exact.map((v,i)=>({i,frac:v-Math.floor(v)})).sort((a,b)=>b.frac-a.frac);
  const result=floored.slice();for(let k=0;k<byFrac.length&&remainder>0;k++){result[byFrac[k].i]+=1;remainder--;}
  return result.map(v=>v/factor);}

/* ---- subs / nw helpers ---- */
function monthlyEquivalent(s){const a=Number(s.amountCHF)||0;if(s.period==='yearly')return a/12;if(s.period==='weekly')return a*52/12;return a;}
function nextRenewalDate(iso,period){const d=parseLocalDate(iso);if(!d)return null;const today=startOfToday();let safety=0;
  while(d<today&&safety++<600){if(period==='weekly')d.setDate(d.getDate()+7);else if(period==='yearly')d.setFullYear(d.getFullYear()+1);else d.setMonth(d.getMonth()+1);}return d;}
function netWorthChf(accounts){return accounts.reduce((s,a)=>{const v=Number(a.amountCHF)||0;return s+(a.type==='debt'?-v:v);},0);}
function assetsChf(accounts){return accounts.reduce((s,a)=>s+(a.type==='debt'?0:Number(a.amountCHF)||0),0);}
function debtChf(accounts){return accounts.reduce((s,a)=>s+(a.type==='debt'?Number(a.amountCHF)||0:0),0);}
function netWorthByType(accounts){const out={bank:0,stocks:0,crypto:0,debt:0,other:0};accounts.forEach(a=>{out[a.type]=(out[a.type]||0)+(Number(a.amountCHF)||0);});return out;}
function runwayMonths(accounts,subscriptions,orders,now){now=now||new Date();const liquid=accounts.reduce((s,a)=>s+(a.type==='bank'?Number(a.amountCHF)||0:0),0);if(liquid<=0)return null;
  const subsBurn=subscriptions.reduce((s,sub)=>s+monthlyEquivalent(sub),0);const cutoff=now.getTime()-30*86400000;
  const recentSpend=orders.reduce((s,o)=>{if(o.direction==='in'||o.ts<cutoff)return s;return s+(Number(o.amountCHF)||0);},0);
  const burn=subsBurn+recentSpend;if(burn<=0.005)return null;return liquid/burn;}
function cryptoValueChf(qty,quote){if(!quote||!isFinite(qty)||qty<=0)return 0;return qty*quote.priceCHF;}
function holdingValueChf(shares,quote){if(!quote||!isFinite(shares)||shares<=0)return 0;return shares*quote.priceUSD/(rates.USD||1);}
function projectGoalDate(history,goalCHF,now){now=now||Date.now();if(!goalCHF||goalCHF<=0||history.length<2)return null;
  const latest=history[history.length-1];if(latest.v>=goalCHF)return null;const cutoff=now-90*86400000;const recent=history.filter(p=>p.t>=cutoff);
  const pts=recent.length>=2?recent:history;const first=pts[0],last=pts[pts.length-1];const dtDays=(last.t-first.t)/86400000;if(dtDays<1)return null;
  const slope=(last.v-first.v)/dtDays;if(slope<=0)return null;const days=(goalCHF-last.v)/slope;if(!isFinite(days)||days<=0||days>365*30)return null;return new Date(now+days*86400000);}
function formatActivityDate(ts){const d=new Date(ts),now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();const yest=today-86400000;
  const ds=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();if(ds===today)return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});if(ds===yest)return'yest';
  const m=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];return m[d.getMonth()]+' '+d.getDate();}
function formatRenewal(iso){const p=relativeDateParts(iso);if(!p)return iso||'';let prefix='';if(p.diffDays<0)prefix='past · ';else if(p.diffDays===0)prefix='today · ';else if(p.diffDays===1)prefix='tomorrow · ';else if(p.diffDays<=7)prefix='in '+p.diffDays+'d · ';return prefix+p.dateLabel;}
function upcomingBills(subs,withinDays){withinDays=withinDays==null?30:withinDays;const today=startOfToday().getTime();const out=[];
  for(const s of subs){const next=nextRenewalDate(s.renewal,s.period);if(!next)continue;const ds=new Date(next.getFullYear(),next.getMonth(),next.getDate()).getTime();const daysUntil=Math.round((ds-today)/86400000);if(daysUntil<0||daysUntil>withinDays)continue;out.push({id:s.id,name:s.name,amountCHF:Number(s.amountCHF)||0,period:s.period,nextDate:next,daysUntil});}
  out.sort((a,b)=>a.daysUntil-b.daysUntil);return out;}
function subscriptionAlerts(subs,trialWithin,hikeWithin){trialWithin=trialWithin||14;hikeWithin=hikeWithin||60;const today=startOfToday().getTime();const alerts=[];
  for(const s of subs){const d=parseLocalDate(s.trialEnds);if(d){const ds=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();const daysUntil=Math.round((ds-today)/86400000);if(daysUntil>=0&&daysUntil<=trialWithin)alerts.push({id:s.id,name:s.name,kind:'trial',daysUntil});}
    if(s.previousAmountCHF!=null&&s.amountCHF>s.previousAmountCHF+0.005){const recent=s.priceChangedAt==null||today-s.priceChangedAt<=hikeWithin*86400000;if(recent)alerts.push({id:s.id,name:s.name,kind:'hike',fromCHF:s.previousAmountCHF,toCHF:s.amountCHF});}}
  alerts.sort((a,b)=>{if(a.kind!==b.kind)return a.kind==='trial'?-1:1;return(a.daysUntil||0)-(b.daysUntil||0);});return alerts;}

/* ---- spend categories ---- */
const CATEGORY_KEYWORDS=[
  {cat:'groceries',words:['grocery','groceries','supermarket','coop','migros','aldi','lidl','market']},
  {cat:'dining',words:['restaurant','cafe','coffee','starbucks','bar','pizza','burger','mcdonald','kfc','uber eats','ubereats','deliveroo','takeaway','dinner','lunch','sushi']},
  {cat:'transport',words:['uber','taxi','train','sbb','flight','airline','fuel','petrol','parking','metro']},
  {cat:'subscriptions',words:['spotify','netflix','subscription','membership','prime','disney','hbo','youtube']},
  {cat:'health',words:['pharmacy','gym','supplement','protein','vitamin','doctor','dental','clinic']},
  {cat:'tech',words:['apple','iphone','macbook','laptop','computer','gadget','electronics','samsung','headphone']},
  {cat:'shopping',words:['amazon','zalando','clothes','clothing','shoes','nike','adidas','apparel','store','zara']},
];
function categorize(name){const n=(name||'').toLowerCase();for(const{cat,words}of CATEGORY_KEYWORDS){if(words.some(w=>n.includes(w)))return cat;}return'other';}
function monthKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+pad2(d.getMonth()+1);}
function monthKeyOf(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1);}
function monthlyRecap(orders,now){now=now||new Date();const thisKey=monthKeyOf(now);const lastKey=monthKeyOf(new Date(now.getFullYear(),now.getMonth()-1,1));
  let thisMonthCHF=0,lastMonthCHF=0,count=0,thisMonthIncomeCHF=0,lastMonthIncomeCHF=0,biggest=null;
  for(const o of orders){const k=monthKey(o.ts);const amt=Number(o.amountCHF)||0;const income=o.direction==='in';
    if(k===thisKey){if(income)thisMonthIncomeCHF+=amt;else{thisMonthCHF+=amt;count++;if(amt>0&&(!biggest||amt>biggest.amountCHF))biggest={name:o.name,amountCHF:amt};}}
    else if(k===lastKey){if(income)lastMonthIncomeCHF+=amt;else lastMonthCHF+=amt;}}
  const deltaCHF=thisMonthCHF-lastMonthCHF;const deltaPct=lastMonthCHF>0.005?deltaCHF/lastMonthCHF*100:null;const netCHF=thisMonthIncomeCHF-thisMonthCHF;
  return{thisMonthCHF,lastMonthCHF,deltaCHF,deltaPct,count,biggest,thisMonthIncomeCHF,lastMonthIncomeCHF,netCHF};}
function categoryBreakdown(orders,now){now=now||new Date();const thisKey=monthKeyOf(now);const totals=new Map();let sum=0;
  for(const o of orders){if(monthKey(o.ts)!==thisKey)continue;if(o.direction==='in')continue;const amt=Number(o.amountCHF)||0;if(amt<=0)continue;const cat=categorize(o.name);totals.set(cat,(totals.get(cat)||0)+amt);sum+=amt;}
  const out=Array.from(totals,([category,total])=>({category,total,pct:sum>0?total/sum*100:0}));out.sort((a,b)=>b.total-a.total);return out;}

/* ---- snapshots / caps ---- */
function pushActivity(entry){const next=state.activity.concat([Object.assign({id:genId(),ts:Date.now()},entry)]);return next.length>ACTIVITY_MAX?next.slice(next.length-ACTIVITY_MAX):next;}
function capOrders(orders){if(orders.length<=ORDERS_MAX)return orders;const undeducted=orders.filter(o=>!o.deductedAt);const deducted=orders.filter(o=>o.deductedAt);const keepN=Math.max(0,ORDERS_MAX-undeducted.length);const keep=new Set(deducted.slice(deducted.length-keepN));return orders.filter(o=>!o.deductedAt||keep.has(o));}
function pushNwSnapshot(){const h=state.netWorthHistory;const total=netWorthChf(state.accounts);const last=h[h.length-1];if(last&&Math.abs((last.v||0)-total)<0.005)return;const next=h.concat([{t:Date.now(),v:total}]);state.netWorthHistory=next.length>NW_HISTORY_MAX?next.slice(next.length-NW_HISTORY_MAX):next;}
function pushPriceSnapshot(history,price){const list=history||[];const last=list[list.length-1];const now=Date.now();if(last&&now-last.t<PRICE_SNAPSHOT_INTERVAL_MS)return list;const next=list.concat([{t:now,p:price}]);return next.length>PRICE_HISTORY_MAX?next.slice(next.length-PRICE_HISTORY_MAX):next;}
function priceHistoryWithin(history,days){if(!history||!history.length)return[];const cutoff=Date.now()-days*86400000;return history.filter(p=>p.t>=cutoff);}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
/* =========================== ACTIONS =========================== */
function commit(){pushNwSnapshot();saveState();render();}

const actions={
  setCurrency(c){state.currency=c;saveState();render();},
  setActiveTab(t){state.activeTab=t;ui.editingSubId=null;saveState();render();if(t==='coach')coachInit();},
  addAccount(type,name,displayAmount){const trimmed=(name||'').trim();if(!trimmed||!isFinite(displayAmount))return;const amountCHF=displayToChf(displayAmount,state.currency);
    state.accounts.push({id:genId(),type,name:trimmed,amountCHF});state.activity=pushActivity({accountType:type,name:trimmed,deltaCHF:amountCHF,kind:'add'});commit();},
  renameAccount(id,name){const a=state.accounts.find(x=>x.id===id);if(a)a.name=(name||'').trim()||a.name;commit();},
  setAccountAmount(id,displayAmount){const a=state.accounts.find(x=>x.id===id);if(!a||!isFinite(displayAmount))return;const next=Math.max(0,displayToChf(displayAmount,state.currency));const delta=next-a.amountCHF;a.amountCHF=next;if(Math.abs(delta)>=0.005)state.activity=pushActivity({accountType:a.type,name:a.name,deltaCHF:delta,kind:'edit'});commit();},
  deleteAccount(id){const a=state.accounts.find(x=>x.id===id);if(!a)return;state.accounts=state.accounts.filter(x=>x.id!==id);state.activity=pushActivity({accountType:a.type,name:a.name,deltaCHF:-a.amountCHF,kind:'delete'});commit();},
  addHolding(ticker,shares){const t=(ticker||'').trim().toUpperCase();if(!t||!isFinite(shares)||shares<=0)return;state.accounts.push({id:genId(),type:'stocks',name:t,ticker:t,shares,amountCHF:0});commit();refreshStockQuotes();},
  addCryptoHolding(coinId,symbol,qty){const id=(coinId||'').trim().toLowerCase();const sym=(symbol||'').trim().toUpperCase();if(!id||!sym||!isFinite(qty)||qty<=0)return;state.accounts.push({id:genId(),type:'crypto',name:sym,ticker:id,shares:qty,amountCHF:0});commit();refreshCryptoQuotes();},
  setHoldingShares(id,shares){const a=state.accounts.find(x=>x.id===id);if(!a||!a.ticker)return;if(!isFinite(shares)||shares<0)return;a.shares=shares;
    const q=a.type==='crypto'?cryptoQuotes[(a.ticker||'').toLowerCase()]:stockQuotes[(a.ticker||'').toUpperCase()];if(q)a.amountCHF=a.type==='crypto'?cryptoValueChf(shares,q):holdingValueChf(shares,q);commit();},
  addSubscription(input){const name=(input.name||'').trim();if(!name||!isFinite(input.displayAmount))return;const amountCHF=displayToChf(input.displayAmount,state.currency);
    state.subscriptions.push({id:genId(),name,amountCHF,period:input.period,enteredAmount:input.displayAmount,enteredCurrency:state.currency,renewal:input.renewal||null,fromAccountId:input.fromAccountId||null,autoDeduct:!!input.autoDeduct,lastDeductedAt:null});commit();},
  updateSubscription(id,patch){const sub=state.subscriptions.find(x=>x.id===id);if(!sub)return;patch=Object.assign({},patch);const displayAmount=patch.displayAmount;delete patch.displayAmount;
    let amountCHF=sub.amountCHF;if(typeof displayAmount==='number'&&isFinite(displayAmount)){const ccy=patch.enteredCurrency||sub.enteredCurrency||state.currency;amountCHF=displayToChf(displayAmount,ccy);}
    Object.assign(sub,patch);sub.amountCHF=amountCHF;if(displayAmount!=null)sub.enteredAmount=displayAmount;commit();},
  deleteSubscription(id){state.subscriptions=state.subscriptions.filter(x=>x.id!==id);ui.editingSubId=null;commit();},
  addOrder(input){const name=(input.name||'').trim();if(!name||!isFinite(input.displayAmount))return;const amountCHF=displayToChf(input.displayAmount,state.currency);const direction=input.direction==='in'?'in':'out';
    let deductedAt=null,pctAtDeduction=null,deductedFromName=null;
    if(direction!=='in'&&input.immediate&&input.fromAccountId){const acct=state.accounts.find(a=>a.id===input.fromAccountId);if(acct){const grand=netWorthChf(state.accounts);pctAtDeduction=grand>0?amountCHF/grand*100:0;deductedAt=Date.now();deductedFromName=acct.name;const next=Math.max(0,acct.amountCHF-amountCHF);const delta=next-acct.amountCHF;acct.amountCHF=next;state.activity=pushActivity({accountType:acct.type,name:acct.name,deltaCHF:delta,kind:'edit'});}}
    state.orders=capOrders(state.orders.concat([{id:genId(),name,amountCHF,direction,enteredAmount:input.displayAmount,enteredCurrency:state.currency,fromAccountId:direction==='in'?null:(input.fromAccountId||null),date:input.date||null,ts:Date.now(),deductedAt,pctAtDeduction,deductedFromName}]));commit();},
  deleteOrder(id){state.orders=state.orders.filter(x=>x.id!==id);commit();},
  deductOrder(id){const o=state.orders.find(x=>x.id===id);if(!o||o.deductedAt)return;const grand=netWorthChf(state.accounts);const pct=grand>0?o.amountCHF/grand*100:0;const acct=o.fromAccountId?state.accounts.find(a=>a.id===o.fromAccountId):null;

    o.deductedAt=Date.now();o.pctAtDeduction=pct;o.deductedFromName=acct?acct.name:null;commit();},
  undoDeductOrder(id){const o=state.orders.find(x=>x.id===id);if(!o||!o.deductedAt)return;const acct=o.fromAccountId?state.accounts.find(a=>a.id===o.fromAccountId):null;
    if(acct){acct.amountCHF=acct.amountCHF+o.amountCHF;state.activity=pushActivity({accountType:acct.type,name:acct.name,deltaCHF:o.amountCHF,kind:'edit'});}
    o.deductedAt=null;o.pctAtDeduction=null;o.deductedFromName=null;commit();},

/* auto-deduct matured subscriptions (one cycle per pass) */
function processRenewals(){const today=startOfToday().getTime();let changed=false;
  state.subscriptions.forEach(sub=>{if(!sub.autoDeduct||!sub.fromAccountId)return;const amt=Number(sub.amountCHF)||0;if(amt<=0)return;const rd=parseLocalDate(sub.renewal);if(!rd)return;
    const rs=new Date(rd.getFullYear(),rd.getMonth(),rd.getDate()).getTime();if(rs>today)return;if(sub.lastDeductedAt!=null&&sub.lastDeductedAt>=rs)return;
    const acct=state.accounts.find(a=>a.id===sub.fromAccountId);if(!acct)return;const next=Math.max(0,acct.amountCHF-amt);const delta=next-acct.amountCHF;acct.amountCHF=next;
    state.activity=pushActivity({accountType:acct.type,name:sub.name,deltaCHF:delta,kind:'edit'});changed=true;
    const adv=new Date(rd);let g=0;do{if(sub.period==='weekly')adv.setDate(adv.getDate()+7);else if(sub.period==='yearly')adv.setFullYear(adv.getFullYear()+1);else adv.setMonth(adv.getMonth()+1);}while(new Date(adv.getFullYear(),adv.getMonth(),adv.getDate()).getTime()<=today&&g++<600);
    sub.renewal=toIsoDate(adv);sub.lastDeductedAt=Date.now();});
  if(changed){pushNwSnapshot();saveState();}}

function smoothPath(points){if(points.length<2)return'';if(points.length===2)return'M'+points[0].x+','+points[0].y+' L'+points[1].x+','+points[1].y;
  const d=['M'+points[0].x+','+points[0].y];for(let i=0;i<points.length-1;i++){const p0=points[i-1]||points[i],p1=points[i],p2=points[i+1],p3=points[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;d.push('C'+c1x+','+c1y+' '+c2x+','+c2y+' '+p2.x+','+p2.y);}return d.join(' ');}
function donutArcPath(cx,cy,rO,rI,a1,a2){const x1o=cx+rO*Math.cos(a1),y1o=cy+rO*Math.sin(a1),x2o=cx+rO*Math.cos(a2),y2o=cy+rO*Math.sin(a2),x1i=cx+rI*Math.cos(a2),y1i=cy+rI*Math.sin(a2),x2i=cx+rI*Math.cos(a1),y2i=cy+rI*Math.sin(a1);const large=a2-a1>Math.PI?1:0;
  return'M '+x1o.toFixed(2)+' '+y1o.toFixed(2)+' A '+rO+' '+rO+' 0 '+large+' 1 '+x2o.toFixed(2)+' '+y2o.toFixed(2)+' L '+x1i.toFixed(2)+' '+y1i.toFixed(2)+' A '+rI+' '+rI+' 0 '+large+' 0 '+x2i.toFixed(2)+' '+y2i.toFixed(2)+' Z';}

function dailyDelta(h){if(h.length<2)return null;const last=h[h.length-1];const cutoff=last.t-86400000;let baseline=null;for(let i=h.length-1;i>=0;i--){if(h[i].t<=cutoff){baseline=h[i];break;}}if(!baseline)baseline=h[0];if(last.t-baseline.t<3600000)return null;const delta=last.v-baseline.v;const pct=Math.abs(baseline.v)>0.005?delta/Math.abs(baseline.v)*100:null;return{delta,pct};}
function dailyDeltaHTML(){const dd=dailyDelta(state.netWorthHistory);if(!dd)return'';if(Math.abs(dd.delta)<0.005)return'<span class="dailyDelta flat">flat · 24h</span>';
  const up=dd.delta>0,sign=up?'+':'−',amt=fmt(Math.abs(dd.delta));const pctLabel=dd.pct==null?'':(up?'+':'−')+(Math.abs(dd.pct)>=100?Math.abs(dd.pct).toFixed(0):Math.abs(dd.pct).toFixed(2))+'%';
  return '<span class="dailyDelta '+(up?'up':'down')+'">'+sign+esc(amt)+(pctLabel?'<span class="dailyDeltaPct">'+pctLabel+'</span>':'')+'<span class="dailyDeltaWindow">· 24h</span></span>';}

const CHART_PERIODS=[{k:'1D',d:1},{k:'1W',d:7},{k:'1M',d:30},{k:'1Y',d:365},{k:'ALL',d:null}];
function chartHTML(){const NW_W=600,NW_H=200,NW_PAD=8;const period=CHART_PERIODS.find(p=>p.k===ui.chartPeriod)||CHART_PERIODS[4];const full=state.netWorthHistory;
  let history=full;if(period.d!=null){const cutoff=Date.now()-period.d*86400000;const inWin=full.filter(p=>p.t>=cutoff);if(inWin.length>=2||full.length===0)history=inWin;else{let anchor=null;for(let i=full.length-1;i>=0;i--){if(full[i].t<cutoff){anchor=full[i];break;}}history=anchor?[anchor].concat(inWin):inWin;}}
  const periodName=period.k==='ALL'?'All-time':period.k;
  const toggle='<div class="periodSeg">'+CHART_PERIODS.map(p=>'<button class="periodBtn '+(p.k===ui.chartPeriod?'periodBtnActive':'')+'" data-act="chart-period" data-p="'+p.k+'">'+(p.k==='ALL'?'All':p.k)+'</button>').join('')+'</div>';
  const stats=chartStatsHTML(history);
  if(history.length<1)return '<div class="chartWrap"><div class="chartHead"><span class="chartLabel">'+periodName+'</span>'+toggle+'</div><div class="chartEmpty">Add or edit an asset to start tracking net worth over time.</div>'+stats+'</div>';
  const first=history[0].v,last=history[history.length-1].v,change=last-first;const direction=Math.abs(change)<0.005?'flat':change>0?'up':'down';const color=direction==='up'?'var(--mint)':direction==='down'?'var(--red)':'var(--muted)';
  let deltaLabel='-';if(direction==='flat')deltaLabel='Flat';else if(Math.abs(first)<0.5){deltaLabel=(change>0?'+':'−')+fmt(Math.abs(change));}else{const pct=change/Math.abs(first)*100;const ap=Math.abs(pct);const ps=ap>=1000?'>999':ap>=100?ap.toFixed(0):ap>=10?ap.toFixed(1):ap.toFixed(2);deltaLabel=(change>0?'+':'−')+ps+'%';}
  const vals=history.map(p=>p.v);const minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);const range=maxV-minV||Math.max(1,Math.abs(maxV));
  let lineD='',areaD='';if(history.length===1){const y=NW_H/2;lineD='M0,'+y+' L'+NW_W+','+y;areaD=lineD+' L'+NW_W+','+NW_H+' L0,'+NW_H+' Z';}else{const points=history.map((p,i)=>({x:i/(history.length-1)*NW_W,y:NW_H-NW_PAD-(p.v-minV)/range*(NW_H-NW_PAD*2)}));lineD=smoothPath(points);const lp=points[points.length-1],fp=points[0];areaD=lineD+' L'+lp.x+','+NW_H+' L'+fp.x+','+NW_H+' Z';}
  return '<div class="chartWrap"><div class="chartHead"><div class="chartHeadLeft"><span class="chartLabel">'+periodName+'</span><span class="chartDelta '+(direction==='up'?'up':direction==='down'?'down':'')+'">'+deltaLabel+'</span></div>'+toggle+'</div>'
    +'<svg class="chartSvg" viewBox="0 0 '+NW_W+' '+NW_H+'" preserveAspectRatio="none" style="color:'+color+'"><defs><linearGradient id="nwGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity="0.55"></stop><stop offset="60%" stop-color="currentColor" stop-opacity="0.18"></stop><stop offset="100%" stop-color="currentColor" stop-opacity="0"></stop></linearGradient></defs>'
    +'<line class="chartGrid" x1="0" x2="'+NW_W+'" y1="40" y2="40"></line><line class="chartGrid" x1="0" x2="'+NW_W+'" y1="100" y2="100"></line><line class="chartGrid" x1="0" x2="'+NW_W+'" y1="160" y2="160"></line>'
    +'<path d="'+areaD+'" fill="url(#nwGrad)" class="chartArea"></path><path d="'+lineD+'" pathLength="1" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="chartLineStroke chartLineDraw"></path></svg>'+stats+'</div>';}
function chartStatsHTML(history){function stat(l,v){return '<div class="chartStat"><span class="chartStatLabel">'+l+'</span><span class="chartStatVal">'+esc(v)+'</span></div>';}
  if(!history.length)return '<div class="chartStatsRow">'+stat('1% of NW','-')+stat('All-time high','-')+stat('All-time low','-')+stat('Snapshots','0')+'</div>';
  const vals=history.map(p=>p.v);const last=vals[vals.length-1];const high=Math.max.apply(null,vals),low=Math.min.apply(null,vals);
  return '<div class="chartStatsRow">'+stat('1% of NW',fmt(last/100))+stat('All-time high',fmt(high))+stat('All-time low',fmt(low))+stat('Snapshots',String(history.length))+'</div>';}

function donutHTML(){const netWorth=netWorthChf(state.accounts);const slices=[];state.accounts.forEach(a=>{if(a.type==='debt')return;if(a.amountCHF>0)slices.push({id:a.id,name:a.name,color:TYPE_COLORS[a.type],value:a.amountCHF});});

  let angle=-Math.PI/2;const arcs=[];slices.forEach(s=>{const sa=s.value/total*Math.PI*2;const pad=slices.length>1?0.015:0;const a1=angle+pad,a2=angle+sa-pad;if(a2>a1)arcs.push({color:s.color,d:donutArcPath(70,70,60,44,a1,a2)});angle+=sa;});

function buildSnapshot(){const ccy=state.currency;const d=chf=>Math.round(chfToDisplay(chf,ccy));const netWorth=netWorthChf(state.accounts);
  const monthlyBurn=state.subscriptions.reduce((s,x)=>s+monthlyEquivalent(x),0);const recap=monthlyRecap(state.orders);const assets=assetsChf(state.accounts);const debt=debtChf(state.accounts);const crypto=state.accounts.reduce((s,a)=>s+(a.type==='crypto'?a.amountCHF:0),0);
  const runway=runwayMonths(state.accounts,state.subscriptions,state.orders);const goalCHF=getGoalCHF();const budgetCHF=getBudgetCHF();const goalPct=goalCHF&&goalCHF>0?Math.round(netWorth/goalCHF*100):null;
  const bills=upcomingBills(state.subscriptions).map(b=>({name:b.name,amountCHF:d(b.amountCHF),daysUntil:b.daysUntil}));
  const alerts=subscriptionAlerts(state.subscriptions).map(a=>a.kind==='trial'?{kind:'trial',name:a.name,detail:a.daysUntil===0?'free trial ends today':'free trial ends in '+a.daysUntil+'d'}:{kind:'hike',name:a.name,detail:'price up: '+d(a.fromCHF||0)+' → '+d(a.toCHF||0)});
  const topCats=categoryBreakdown(state.orders).slice(0,4).map(c=>({category:c.category,totalCHF:d(c.total)}));
  return{currency:ccy,netWorthCHF:d(netWorth),monthlyBurnCHF:d(monthlyBurn),assetsCHF:d(assets),debtCHF:d(debt),cryptoCHF:d(crypto),upcomingBills:bills,alerts,thisMonthSpendCHF:d(recap.thisMonthCHF),lastMonthSpendCHF:d(recap.lastMonthCHF),thisMonthIncomeCHF:d(recap.thisMonthIncomeCHF),netCashFlowCHF:d(recap.netCHF),budgetCHF:budgetCHF==null?null:d(budgetCHF),topCategories:topCats,runwayMonths:runway==null?null:Math.round(runway*10)/10,goalCHF:goalCHF==null?null:d(goalCHF),goalPct};}
function snapSignature(s){return[s.netWorthCHF,s.monthlyBurnCHF,s.thisMonthSpendCHF,s.thisMonthIncomeCHF,s.debtCHF,s.upcomingBills.length,s.alerts.length,s.budgetCHF==null?'-':s.budgetCHF,s.runwayMonths==null?'-':s.runwayMonths,s.goalCHF==null?'-':s.goalCHF].join(':');}
function snapshotText(s){const ccy=s.currency||'CHF';const f=(chf)=>ccy+' '+(Number(chf)||0).toLocaleString('en-US',{maximumFractionDigits:0});const L=[];
  L.push('Net worth: '+f(s.netWorthCHF));if(s.debtCHF>0)L.push('Debt: '+(s.assetsCHF!=null?f(s.assetsCHF)+' assets − ':'')+f(s.debtCHF)+' owed');if(s.cryptoCHF>0)L.push('Crypto holdings: '+f(s.cryptoCHF));
  L.push('Subscriptions: '+f(s.monthlyBurnCHF)+' / month');if(s.thisMonthSpendCHF!=null)L.push('Spent this month: '+f(s.thisMonthSpendCHF)+(s.lastMonthSpendCHF!=null?' (last month '+f(s.lastMonthSpendCHF)+')':''));
  if(s.thisMonthIncomeCHF>0)L.push('Income this month: '+f(s.thisMonthIncomeCHF)+(s.netCashFlowCHF!=null?', net '+(s.netCashFlowCHF>=0?'+':'−')+f(Math.abs(s.netCashFlowCHF)):''));
  if(s.runwayMonths!=null)L.push('Runway: ~'+(s.runwayMonths>=99?'99+':s.runwayMonths.toFixed(1))+' months of cash cushion');if(s.budgetCHF!=null)L.push('Monthly budget: '+f(s.budgetCHF));
  if(s.goalCHF!=null)L.push('Net-worth goal: '+f(s.goalCHF)+(s.goalPct!=null?' ('+Math.round(s.goalPct)+'% there)':''));
  if(s.topCategories&&s.topCategories.length)L.push('Top spend: '+s.topCategories.slice(0,4).map(c=>c.category+' '+f(c.totalCHF)).join(', '));
  if(s.upcomingBills&&s.upcomingBills.length)L.push('Upcoming bills: '+s.upcomingBills.slice(0,6).map(b=>b.name+' '+f(b.amountCHF)+' in '+b.daysUntil+'d').join(', '));
  if(s.alerts&&s.alerts.length)L.push('Alerts: '+s.alerts.slice(0,6).map(a=>a.name+' ('+a.kind+') — '+a.detail).join('; '));return L.join('\n');}
function coachSystem(s){return['You are Echo, a calm, sharp personal-finance coach inside the Vitality app.','You speak to the user about THEIR money only, using the snapshot below. Be warm,','concrete, and brief. No preamble, no disclaimers, no markdown headings. One or two','short sentences unless asked for more. Never invent numbers not in the snapshot;','if something is missing, say what to add. Amounts are already in the user\'s currency.','When relevant, weigh debt payoff, cash runway, this-month cash flow (income vs spend),','and progress toward their net-worth goal — not just spending.','Respond with only the final answer — do not narrate your reasoning.','','Today\'s finance snapshot:',snapshotText(s)].join('\n');}
const SCORE_INSTRUCTION='Rate the user\'s money situation today from 1 (rough) to 10 (great) given the snapshot, weighing upcoming bills, overspend vs budget, subscription burn, debt load, cash runway, this-month cash flow, goal progress, and net worth direction. Reply ONLY with compact JSON: {"score": <1-10 integer>, "reason": "<one short sentence>"}.';

function coachReadCache(){try{return JSON.parse(localStorage.getItem(COACH_CACHE_KEY)||'{}')||{};}catch(e){return{};}}
function coachWriteCache(dayKey,entry){try{const c=coachReadCache();c[dayKey]=entry;localStorage.setItem(COACH_CACHE_KEY,JSON.stringify(c));}catch(e){}}

let coachInited=false;
function coachInit(){const snap=buildSnapshot();const hasData=snap.netWorthCHF>0||snap.monthlyBurnCHF>0;coach.dayKey=getLocalDateKey();
  if(coachInited)return;coachInited=true;
  if(!keys.anthropic){coach.scored=true;coach.score=null;coach.reason='';render();return;}
  if(!hasData){coach.scored=true;coach.score=null;coach.reason='';render();return;}
  const cached=coachReadCache()[coach.dayKey];if(cached&&cached.sig===snapSignature(snap)){coach.score=cached.score;coach.reason=cached.reason;coach.scored=true;render();return;}
  coachScore();}

async function coachScore(){const snap=buildSnapshot();if(!keys.anthropic){openKeysModal();return;}coach.scoring=true;coach.err=null;render();
  try{const text=await callAnthropic(COACH_MODEL,coachSystem(snap),[{role:'user',content:SCORE_INSTRUCTION}],220);
    const m=text.match(/\{[\s\S]*\}/);let score=null,reason=text;if(m){try{const obj=JSON.parse(m[0]);const raw=Number(obj.score);score=isFinite(raw)?Math.max(1,Math.min(10,Math.round(raw))):null;if(typeof obj.reason==='string'&&obj.reason.trim())reason=obj.reason.trim();}catch(e){}}
    coach.score=score;coach.reason=reason;coach.scored=true;coachWriteCache(coach.dayKey,{sig:snapSignature(snap),score,reason});
  }catch(e){coach.err='Coach could not score right now.';}finally{coach.scoring=false;render();}}

async function coachSend(text){const content=(text||'').trim();if(!content||coach.chatting)return;if(!keys.anthropic){openKeysModal();return;}

  }catch(e){coach.err='Coach could not answer right now.';}finally{coach.chatting=false;render();const log=document.querySelector('.coach-chatLog');if(log)log.scrollTop=log.scrollHeight;}}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Williams Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lock.js" defer></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }

.dash-title {
  margin: 0 0 18px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== BENTO GRID ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}

.big  { grid-column: span 2; grid-row: span 2; }
.wide { grid-column: span 2; }

/* ===== TILE ===== */
.tile {
  --accent: #FAFAFA;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 18px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  text-decoration: none;
  color: var(--text-primary);
  overflow: hidden;
  transition:
    transform 0.20s cubic-bezier(0.22, 1, 0.36, 1),
    border-color 0.20s,
    background 0.20s,
    box-shadow 0.20s;
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.05) inset,
    0 8px 32px rgba(0,0,0,0.35);
}
.tile:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.065);
  box-shadow:
    0 1px 0 0 rgba(255,255,255,0.07) inset,
    0 18px 48px rgba(0,0,0,0.48);
}

/* Accent tint overlay + border glow on hover via outline trick */
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(ellipse at 100% 0%, var(--accent), transparent 65%);
  opacity: 0.07;
  pointer-events: none;
  transition: opacity 0.20s;
}
.tile:hover::before { opacity: 0.13; }
.tile:hover { border-color: rgba(255,255,255,0.12); }

/* Tile number */
.tile-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.22);
}

/* Emoji */
.tile-emoji {
  position: absolute;
  top: 16px; right: 18px;
  font-size: 28px; line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
  opacity: 0.88;
  transition: transform 0.20s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.20s;
}
.tile:hover .tile-emoji { transform: scale(1.10); opacity: 1; }
.big .tile-emoji { font-size: 42px; top: 20px; right: 20px; }

/* Spacer */
.tile-spacer { flex: 1; }

/* Title */
.tile-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 5px;
  line-height: 1.2;
}
.big .tile-title { font-size: 26px; margin-bottom: 8px; }

/* Footer */
.tile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.tile-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  line-height: 1.4;
  flex: 1;
}
.big .tile-sub { font-size: 13px; }
.tile-arrow {
  font-size: 15px;
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  transition: transform 0.20s cubic-bezier(0.22, 1, 0.36, 1);
}
.tile:hover .tile-arrow { transform: translateX(5px); }

/* ===== RESPONSIVE ===== */
@media (max-width: 720px) {
  .bento {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 148px;
    gap: 10px;
  }
  .big { grid-row: span 1; }
  .big .tile-title { font-size: 20px; }
  .big .tile-emoji { font-size: 32px; }
}
@media (max-width: 440px) {
  .bento {
    grid-template-columns: 1fr;
    grid-auto-rows: 132px;
    gap: 8px;
  }
  .wide, .big { grid-column: span 1; grid-row: span 1; }
  .big .tile-title { font-size: 18px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <!-- ·01 Main — big -->
    <a href="main.html" class="tile big" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji">🏠</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals & daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·02 Fitness — wide -->
    <a href="gym.html" class="tile wide" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji">💪</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·03 Health — small -->
    <a href="health.html" class="tile" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji">💊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·04 Faith — small -->
    <a href="faith.html" class="tile" style="--accent:#F2C063">
      <span class="tile-num">·04</span>
      <span class="tile-emoji">✝️</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Faith</div>
      <div class="tile-footer">
        <span class="tile-sub">Prayers and devotion</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·05 Water — small -->
    <a href="po-water.html" class="tile" style="--accent:#60A5FA">
      <span class="tile-num">·05</span>
      <span class="tile-emoji">💧</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration tracker</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <!-- ·06 Finance — wide -->
    <a href="finance.html" class="tile wide" style="--accent:#F2C063">
      <span class="tile-num">·06</span>
      <span class="tile-emoji">📊</span>
      <div class="tile-spacer"></div>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth & spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
